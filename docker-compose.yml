services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sysadmin-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
    networks:
      - sysadmin_net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: sysadmin-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - sysadmin_net

networks:
  sysadmin_net:
    driver: bridge

volumes:
  backend_storage:
  redis_data:
