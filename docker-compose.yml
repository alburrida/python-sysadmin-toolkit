services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sysadmin-backend
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - backend_storage:/app/storage
    networks:
      - sysadmin_net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: sysadmin-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - sysadmin_net

  proxy:
    image: nginx:alpine
    container_name: sysadmin-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./static:/usr/share/nginx/html/static:ro
    networks:
      - sysadmin_net
    depends_on:
      - backend

networks:
  sysadmin_net:
    driver: bridge

volumes:
  backend_storage:
  redis_data:
