events {
    worker_connections 1024;
}

http {
    # Límite básico por IP para proteger la API frente a abuso o fuerza bruta.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Backend FastAPI dentro de la red Docker Compose.
    upstream backend_api {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Redirige todo HTTP a HTTPS local.
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/local.crt;
        ssl_certificate_key /etc/nginx/certs/local.key;

        # Archivos estáticos servidos directamente por NGINX.
        location /static/ {
            alias /usr/share/nginx/html/static/;
            autoindex off;
        }

        # Proxy inverso hacia FastAPI.
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect off;
        }
    }
}
